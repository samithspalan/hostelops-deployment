services:

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - hostel-network

  backend:
    build: ../Hostel-Management-Backend
    container_name: backend
    restart: always
    env_file:
      - ../Hostel-Management-Backend/.env
    depends_on:
      - mongo
    networks:
      - hostel-network

  frontend:
    build: ../Hostel-Complaint-Management-System
    container_name: frontend
    restart: always
    networks:
      - hostel-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - hostel-network

networks:
  hostel-network:

volumes:
  mongo-data:
