name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Image
        run: docker build -t samithspalan/deployment-backend:latest ../Hostel-Management-Backend

      - name: Build Frontend Image
        run: docker build -t samithspalan/deployment-frontend:latest ../Hostel-Complaint-Management-System

      - name: Push Images
        run: |
          docker push samithspalan/deployment-backend:latest
          docker push samithspalan/deployment-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd hostelops-deployment
            docker compose pull
            docker compose up -d
            